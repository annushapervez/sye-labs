<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line-anim {
        stroke-dasharray: 5 4;
        stroke-dashoffset: 100;
        animation: dash 8s linear infinite;
      }
      .line-anim:nth-child(1) { animation-delay: 0s; }
      .line-anim:nth-child(2) { animation-delay: 0.8s; }
      .line-anim:nth-child(3) { animation-delay: 1.6s; }
      .line-anim:nth-child(4) { animation-delay: 2.4s; }
      .line-anim:nth-child(5) { animation-delay: 3.2s; }
      .line-anim:nth-child(6) { animation-delay: 4s; }

      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }

      .outer-node {
        animation: floatNode 6s ease-in-out infinite alternate;
        transform-box: fill-box;
        transform-origin: center;
      }
      .outer-node:nth-child(1) { animation-delay: 0s; }
      .outer-node:nth-child(2) { animation-delay: 1s; }
      .outer-node:nth-child(3) { animation-delay: 2s; }
      .outer-node:nth-child(4) { animation-delay: 3s; }
      .outer-node:nth-child(5) { animation-delay: 4s; }
      .outer-node:nth-child(6) { animation-delay: 5s; }

      @keyframes floatNode {
        0%   { r: 13; opacity: 0.8; }
        100% { r: 16; opacity: 1; }
      }

      .center-pulse {
        animation: pulse 6s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes pulse {
        0%, 100% { r: 36; opacity: 0.12; }
        50%       { r: 50; opacity: 0.2; }
      }

      .center-pulse-2 {
        animation: pulse2 6s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes pulse2 {
        0%, 100% { r: 60; opacity: 0.06; }
        50%       { r: 75; opacity: 0.12; }
      }

      .center-core {
        animation: corebeat 6s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      @keyframes corebeat {
        0%, 100% { r: 22; }
        50%       { r: 25; }
      }

      .accent-dot {
        animation: accentFloat 7s ease-in-out infinite alternate;
        transform-box: fill-box;
        transform-origin: center;
      }
      .accent-dot:nth-child(1) { animation-delay: 0s; }
      .accent-dot:nth-child(2) { animation-delay: 1.5s; }
      .accent-dot:nth-child(3) { animation-delay: 3s; }
      .accent-dot:nth-child(4) { animation-delay: 4.5s; }
      @keyframes accentFloat {
        0%   { opacity: 0.25; r: 4; }
        100% { opacity: 0.6; r: 6; }
      }
    </style>
  </defs>

  <circle class="center-pulse-2" cx="200" cy="200" r="60" fill="#b55a35"/>
  <circle class="center-pulse" cx="200" cy="200" r="36" fill="#b55a35"/>

  <g>
    <line class="line-anim" x1="200" y1="200" x2="200" y2="80" stroke="#b55a35" stroke-width="2" opacity="0.55"/>
    <line class="line-anim" x1="200" y1="200" x2="310" y2="130" stroke="#b55a35" stroke-width="2" opacity="0.55"/>
    <line class="line-anim" x1="200" y1="200" x2="300" y2="270" stroke="#b55a35" stroke-width="2" opacity="0.55"/>
    <line class="line-anim" x1="200" y1="200" x2="200" y2="310" stroke="#b55a35" stroke-width="2" opacity="0.55"/>
    <line class="line-anim" x1="200" y1="200" x2="100" y2="270" stroke="#b55a35" stroke-width="2" opacity="0.55"/>
    <line class="line-anim" x1="200" y1="200" x2="90" y2="130" stroke="#b55a35" stroke-width="2" opacity="0.55"/>
  </g>

  <g>
    <circle class="outer-node" cx="200" cy="80" r="13" fill="#c07050"/>
    <circle class="outer-node" cx="310" cy="130" r="13" fill="#c07050"/>
    <circle class="outer-node" cx="300" cy="270" r="13" fill="#c07050"/>
    <circle class="outer-node" cx="200" cy="310" r="13" fill="#c07050"/>
    <circle class="outer-node" cx="100" cy="270" r="13" fill="#c07050"/>
    <circle class="outer-node" cx="90" cy="130" r="13" fill="#c07050"/>
  </g>

  <g>
    <circle class="accent-dot" cx="148" cy="105" r="5" fill="#d09878"/>
    <circle class="accent-dot" cx="320" cy="200" r="4" fill="#d09878"/>
    <circle class="accent-dot" cx="260" cy="340" r="4" fill="#d09878"/>
    <circle class="accent-dot" cx="72" cy="200" r="3" fill="#d09878"/>
  </g>

  <circle class="center-core" cx="200" cy="200" r="22" fill="#b55a35"/>
</svg>
