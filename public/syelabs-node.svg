<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow rings -->
  <circle cx="200" cy="200" r="120" fill="#b55a35" opacity="0.07"/>
  <circle cx="200" cy="200" r="80" fill="#b55a35" opacity="0.09"/>

  <!-- Connector lines from true center -->
  <line x1="200" y1="200" x2="200" y2="80" stroke="#b55a35" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>
  <line x1="200" y1="200" x2="310" y2="130" stroke="#b55a35" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>
  <line x1="200" y1="200" x2="300" y2="270" stroke="#b55a35" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>
  <line x1="200" y1="200" x2="200" y2="310" stroke="#b55a35" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>
  <line x1="200" y1="200" x2="100" y2="270" stroke="#b55a35" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>
  <line x1="200" y1="200" x2="90" y2="130" stroke="#b55a35" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>

  <!-- Outer nodes -->
  <circle cx="200" cy="80" r="14" fill="#c07050" opacity="0.9"/>
  <circle cx="310" cy="130" r="14" fill="#c07050" opacity="0.9"/>
  <circle cx="300" cy="270" r="14" fill="#c07050" opacity="0.9"/>
  <circle cx="200" cy="310" r="14" fill="#c07050" opacity="0.9"/>
  <circle cx="100" cy="270" r="14" fill="#c07050" opacity="0.9"/>
  <circle cx="90" cy="130" r="14" fill="#c07050" opacity="0.9"/>

  <!-- Floating accent dots -->
  <circle cx="148" cy="105" r="6" fill="#d09878" opacity="0.5"/>
  <circle cx="320" cy="200" r="5" fill="#d09878" opacity="0.4"/>
  <circle cx="260" cy="340" r="5" fill="#d09878" opacity="0.4"/>
  <circle cx="72" cy="200" r="4" fill="#d09878" opacity="0.35"/>

  <!-- Center node — drawn last so it sits on top -->
  <circle cx="200" cy="200" r="36" fill="#b55a35" opacity="0.18"/>
  <circle cx="200" cy="200" r="22" fill="#b55a35"/>
</svg>
